<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hidayathul Islam Madrasa — Donor Records</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar glass">
    <div class="nav-brand">
      <i class="ti ti-building-mosque"></i>
      <span>Hidayathul Islam Madrasa Committee</span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link active"><i class="ti ti-users"></i> Donors</a>
      <a href="add-donor.html" class="nav-link"><i class="ti ti-user-plus"></i> Add Donor</a>
      <a href="dashboard.html" class="nav-link"><i class="ti ti-chart-bar"></i> Dashboard</a>
    </div>
  </nav>

  <div class="container">

    <div class="page-header">
      <div>
        <h1 class="page-title">Donor Records</h1>
        <p class="page-subtitle">All registered donors and payment status</p>
      </div>
      <div class="filter-row">
        <select id="filter-month" onchange="renderList()">
          <option value="all">All Months</option>
        </select>
      </div>
    </div>

    <!-- Search Bar -->
    <div style="margin-bottom:18px;position:relative;">
      <i class="ti ti-search" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);
         color:#555;font-size:16px;pointer-events:none;"></i>
      <input id="search-input" type="text" placeholder="Search by name or phone number…"
        style="width:100%;padding:11px 14px 11px 40px;background:#111;border:1px solid #2a2a2a;
               border-radius:10px;color:#fff;font-size:14px;box-sizing:border-box;outline:none;" />
    </div>

    <div class="donor-list" id="donor-list"></div>

  </div>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Hidayathul Islam Madrasa Committee. All rights reserved.</p>
    <p class="footer-sub">Developed for internal funding management</p>
  </footer>

  <div id="toast" class="toast"></div>
  <script type="module" src="app.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
