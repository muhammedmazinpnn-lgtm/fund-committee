<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hidayathul Islam Madrasa — Donor Records</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar glass">
    <div class="nav-brand">
      <i class="ti ti-building-mosque"></i>
      <span>Hidayathul Islam Madrasa Committee</span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link active"><i class="ti ti-users"></i> <span>Donors</span></a>
      <a href="add-donor.html" class="nav-link"><i class="ti ti-user-plus"></i> <span>Add Donor</span></a>
      <a href="dashboard.html" class="nav-link"><i class="ti ti-chart-bar"></i> <span>Dashboard</span></a>
      <a href="login.html" class="nav-link"><i class="ti ti-login"></i> <span>Login</span></a>
    </div>
  </nav>

  <div class="container">

    <div class="page-header">
      <div>
        <h1 class="page-title">Donor Records</h1>
        <p class="page-subtitle">All registered donors and payment status</p>
      </div>
      <div class="filter-row">
        <select id="filter-month" onchange="renderList()">
          <option value="all">All Months</option>
        </select>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="search-wrap">
      <i class="ti ti-search search-icon"></i>
      <input id="search-input" type="text" placeholder="Search by name or phone…" />
    </div>

    <!-- Paid / Pending Tabs -->
    <div class="status-tabs">
      <input type="hidden" id="filter-status" value="all" />
      <button class="status-tab tab-active" data-status="all" onclick="setStatus('all', this)">All</button>
      <button class="status-tab" data-status="paid" onclick="setStatus('paid', this)">
        <i class="ti ti-circle-check" style="font-size:12px;"></i> Paid
      </button>
      <button class="status-tab" data-status="pending" onclick="setStatus('pending', this)">
        <i class="ti ti-clock" style="font-size:12px;"></i> Pending
      </button>
    </div>

    <div class="donor-list" id="donor-list">
      <div class="empty glass"><i class="ti ti-loader-2 spin"></i> Loading donors…</div>
    </div>

  </div>

  <!-- Donor Detail Modal -->
  <div id="donor-modal-overlay" class="modal-overlay" onclick="closeDonorModal(event)">
    <div class="donor-modal glass" id="donor-modal">
      <button class="modal-close" onclick="closeDonorModalDirect()">
        <i class="ti ti-x"></i>
      </button>
      <div id="donor-modal-content"></div>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Hidayathul Islam Madrasa Committee. All rights reserved.</p>
    <p class="footer-sub">Developed for Madrasa Committee Fund Management</p>
  </footer>

  <div id="toast" class="toast"></div>

  <script type="module" src="app.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    function setStatus(val, btn) {
      document.getElementById('filter-status').value = val;
      document.querySelectorAll('.status-tab').forEach(b => b.classList.remove('tab-active'));
      btn.classList.add('tab-active');
      if (window.renderList) renderList();
    }
  </script>
</body>
</html>
