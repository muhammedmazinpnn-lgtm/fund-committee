<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hidayathul Islam Madrasa — Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar glass">
    <div class="nav-brand">
      <i class="ti ti-building-mosque"></i>
      <span>Hidayathul Islam Madrasa Committee</span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link"><i class="ti ti-users"></i> <span>Donors</span></a>
      <a href="add-donor.html" class="nav-link"><i class="ti ti-user-plus"></i> <span>Add Donor</span></a>
      <a href="dashboard.html" class="nav-link active"><i class="ti ti-chart-bar"></i> <span>Dashboard</span></a>
    </div>
  </nav>

  <div class="container">

    <div class="page-header">
      <div>
        <h1 class="page-title">Dashboard</h1>
        <p class="page-subtitle">Monthly collection overview and statistics</p>
      </div>
      <div class="filter-row">
        <select id="filter-month" onchange="renderDashboard()">
          <option value="all">All Months</option>
        </select>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="stats">
      <div class="empty glass" style="grid-column:1/-1;"><i class="ti ti-loader-2 spin"></i> Loading…</div>
    </div>

    <!-- Monthly Breakdown (shown when "All Months") -->
    <div id="breakdown-section">
      <div class="breakdown-header">
        <h2 class="section-title" style="margin:0;">Monthly Breakdown</h2>
      </div>
      <div class="monthly-grid" id="monthly-grid"></div>
    </div>

    <!-- Donor list -->
    <div id="donor-section">
      <div class="breakdown-header">
        <h2 class="section-title" id="donor-section-title" style="margin:0;"></h2>
      </div>

      <!-- Search bar for donor list -->
      <div class="search-wrap" style="margin-bottom:12px;">
        <i class="ti ti-search search-icon"></i>
        <input type="text" id="dashboard-search" placeholder="Search by name or phone…"
               oninput="filterDashboardDonors()" />
      </div>

      <div id="dashboard-donor-list"></div>
    </div>

  </div>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Hidayathul Islam Madrasa Committee. All rights reserved.</p>
    <p class="footer-sub">Developed for Madrasa Committee Fund Management</p>
  </footer>

  <div id="toast" class="toast"></div>

  <!-- Donor Detail Modal -->
  <div id="donor-modal-overlay" class="modal-overlay" onclick="closeDonorModal(event)">
    <div class="modal-box glass">
      <button class="modal-close" onclick="closeDonorModalDirect()"><i class="ti ti-x"></i></button>
      <div id="donor-modal-content"></div>
    </div>
  </div>

  <script src="pin.js"></script>
  <script type="module" src="app.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
