<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hidayathul Islam Madrasa — Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar glass">
    <div class="nav-brand">
      <i class="ti ti-building-mosque"></i>
      <span>HIM Committee</span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link"><i class="ti ti-users"></i> Donors</a>
      <a href="add-donor.html" class="nav-link"><i class="ti ti-user-plus"></i> Add Donor</a>
      <a href="dashboard.html" class="nav-link active"><i class="ti ti-chart-bar"></i> Dashboard</a>
    </div>
  </nav>

  <div class="container">

    <div class="page-header">
      <div>
        <h1 class="page-title">Dashboard</h1>
        <p class="page-subtitle">Monthly collection overview and statistics</p>
      </div>
      <div class="filter-row">
        <select id="filter-month" onchange="renderDashboard()">
          <option value="all">All Months</option>
        </select>
      </div>
    </div>

    <!-- Summary Stats -->
    <div class="stats-grid" id="stats"></div>

    <!-- Monthly Breakdown -->
    <h2 class="section-title" style="margin-top:28px;">Monthly Breakdown</h2>
    <div class="monthly-grid" id="monthly-grid"></div>

    <!-- Top Donors -->
    <h2 class="section-title" style="margin-top:28px;">Top Donors</h2>
    <div class="top-donors" id="top-donors"></div>

  </div>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Hidayathul Islam Madrasa Committee. All rights reserved.</p>
    <p class="footer-sub">Developed for internal funding management</p>
  </footer>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    renderDashboard();
  </script>
</body>
</html>
